components:
  schemas:
    RegisterInput:
      type: object
      required:
        - email
        - password
        - firstName
        - lastName
      properties:
        email:
          type: string
          example: "user@example.com"
        password:
          type: string
          format: password
          example: "string123"
        firstName:
          type: string
          example: "Иван"
        lastName:
          type: string
          example: "Иванов"
        birthDate:
          type: string
          format: date
          example: "1990-01-01"

    LoginInput:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          example: "user@example.com"
        password:
          type: string
          format: password
          example: "string123"

    UserResponse:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        role:
          type: string
          enum: [user, admin]

paths:
  /api/users/register:
    post:
      summary: Регистрация нового пользователя
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        201:
          description: Пользователь успешно создан
        400:
          description: Ошибка валидации

  /api/users/login:
    post:
      summary: Авторизация пользователя
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        200:
          description: Успешный вход, возвращен токен
        401:
          description: Неверный логин или пароль

  /api/users:
    get:
      summary: Получение всех пользователей (Admin only)
      tags:
        - Users
      security:
        - bearerAuth: []
      responses:
        200:
          description: Список пользователей
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserResponse"
        401:
          description: Не авторизован
        403:
          description: Нет прав доступа (не админ)

  /api/users/{id}/block:
    patch:
      summary: Блокировка/разблокировка пользователя (Admin only)
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Статус пользователя изменен
